services:
  backend:
    build: .
    image: easy_proxies_backend:local
    container_name: easy-proxies-backend
    restart: unless-stopped
    ports:
      - "2323:2323"
      - "9090:9090"
      - "24000-24200:24000-24200"
    volumes:
      - ./config.yaml:/etc/easy-proxies/config.yaml
      - ./data:/etc/easy-proxies/data
      - ./checker:/etc/easy-proxies/checker
    command: ["--config", "/etc/easy-proxies/config.yaml"]

  frontend:
    build:
      context: ./frontend
    image: easy_proxies_frontend:local
    container_name: easy-proxies-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:9090
    ports:
      - "3001:3000"
